<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment – MedEase</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --teal:#0ea5a0; --teal-dark:#0c8a86; --navy:#0d1f2d; --navy2:#162535; --slate:#1e3448; --accent:#f97316; --white:#f8fafc; --muted:#94a3b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--white); }
  nav { position:fixed; top:0; width:100%; z-index:100; background:rgba(13,31,45,0.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(14,165,160,0.15); display:flex; align-items:center; justify-content:space-between; padding:0 5vw; height:64px; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--teal); }
  .logo span { color:var(--white); }
  .nav-links { display:flex; gap:8px; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:0.875rem; padding:6px 14px; border-radius:8px; transition:all 0.2s; }
  .nav-links a:hover, .nav-links a.active { color:var(--white); background:rgba(14,165,160,0.15); }
  .nav-cta { background:var(--teal) !important; color:var(--white) !important; }

  main { padding:88px 5vw 60px; max-width:1100px; margin:0 auto; }
  .page-header { margin-bottom:36px; }
  .page-label { font-size:0.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--teal); font-family:'Syne',sans-serif; margin-bottom:8px; }
  h1 { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; }

  .two-col { display:grid; grid-template-columns:1fr 1.2fr; gap:28px; }

  .panel { background:var(--navy2); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:24px; }
  .panel-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:16px; color:var(--teal); }
  .doctor-card {
    background:var(--slate); border:2px solid transparent; border-radius:12px;
    padding:16px; margin-bottom:12px; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; gap:14px;
  }
  .doctor-card:hover { border-color:rgba(14,165,160,0.4); }
  .doctor-card.selected { border-color:var(--teal); background:rgba(14,165,160,0.1); }
  .doctor-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--teal),#0ea5e9); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
  .doctor-info { flex:1; }
  .doctor-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; }
  .doctor-spec { font-size:0.8rem; color:var(--muted); }
  .doctor-meta { display:flex; align-items:center; gap:8px; margin-top:4px; }
  .badge { font-size:0.7rem; padding:2px 8px; border-radius:999px; font-weight:600; }
  .badge-avail { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
  .badge-busy { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
  .doctor-fee { font-size:0.8rem; color:var(--accent); font-weight:600; }
  .queue-info { font-size:0.75rem; color:var(--muted); }

  .form-group { margin-bottom:18px; }
  label { display:block; font-size:0.82rem; color:var(--muted); margin-bottom:6px; font-family:'Syne',sans-serif; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  input, select {
    width:100%; background:var(--slate); border:1px solid rgba(255,255,255,0.1);
    color:var(--white); padding:11px 14px; border-radius:10px; font-size:0.9rem;
    font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
  }
  input:focus, select:focus { border-color:var(--teal); }
  select option { background:var(--navy2); }
  .two-inputs { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .btn-submit {
    width:100%; background:var(--teal); color:var(--white); border:none;
    padding:13px; border-radius:10px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.2s;
    margin-top:8px; box-shadow:0 4px 16px rgba(14,165,160,0.3);
  }
  .btn-submit:hover { background:var(--teal-dark); transform:translateY(-1px); }
  .selected-doc-info {
    background:rgba(14,165,160,0.1); border:1px solid rgba(14,165,160,0.3);
    border-radius:10px; padding:12px 16px; margin-bottom:18px; font-size:0.875rem;
    display:none;
  }
  .selected-doc-info.show { display:block; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--navy2); border:1px solid rgba(14,165,160,0.3); border-radius:20px; padding:40px; max-width:420px; width:90%; text-align:center; }
  .modal-icon { font-size:3rem; margin-bottom:16px; }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:8px; }
  .token-display { background:var(--slate); border:2px dashed var(--teal); border-radius:12px; padding:20px; margin:20px 0; }
  .token-number { font-family:'Syne',sans-serif; font-size:2.5rem; font-weight:800; color:var(--teal); }
  .token-label { font-size:0.8rem; color:var(--muted); }
  .modal-btn { background:var(--teal); color:var(--white); border:none; padding:12px 28px; border-radius:10px; font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; width:100%; font-size:0.95rem; }

  @media(max-width:768px) { .two-col { grid-template-columns:1fr; } .two-inputs { grid-template-columns:1fr; } }
</style>
</head>
<body>
<nav>
  <div class="logo">Med<span>Ease</span></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/appointment" class="active">Appointments</a>
    <a href="/queue">Queue</a>
    <a href="/payment">Payment</a>
    <a href="/admin">Admin</a>
    <a href="/chatbot">💬 Chatbot</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-label">OPD Booking</div>
    <h1>Book an Appointment</h1>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-title">🩺 Select a Doctor</div>
      <div id="doctorList">Loading doctors...</div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Patient Details</div>

      <div class="selected-doc-info" id="selectedDocInfo">
        Selected: <strong id="selDocName">–</strong> · Fee: <span id="selDocFee">–</span>
      </div>

      <div class="form-group two-inputs">
        <div>
          <label>Full Name</label>
          <input type="text" id="patientName" placeholder="e.g. Rahul Sharma">
        </div>
        <div>
          <label>Phone Number</label>
          <input type="tel" id="patientPhone" placeholder="9876543210">
        </div>
      </div>
      <div class="form-group two-inputs">
        <div>
          <label>Age</label>
          <input type="number" id="patientAge" placeholder="25" min="1" max="120">
        </div>
        <div>
          <label>Gender</label>
          <select id="patientGender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group two-inputs">
        <div>
          <label>Date</label>
          <input type="date" id="apptDate" onchange="filterTimeSlots()">
        </div>
        <div>
          <label>Time Slot</label>
          <select id="timeSlot">
            <option value="">Select</option>
          </select>
        </div>
      </div>
      <button class="btn-submit" onclick="bookAppointment()">📅 Confirm Appointment</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon">✅</div>
    <div class="modal-title">Appointment Confirmed!</div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:0">Your token number is:</p>
    <div class="token-display">
      <div class="token-number" id="tokenNum">–</div>
      <div class="token-label">Show this at the reception</div>
    </div>
    <p style="color:var(--muted);font-size:0.8rem;margin-bottom:20px" id="apptSummary"></p>
    <button class="modal-btn" onclick="closeModal()">Done</button>
  </div>
</div>

<script>
  let selectedDoctor = null;
  const allSlots = [
    "8:00 AM","8:30 AM","9:00 AM","9:30 AM",
    "10:00 AM","10:30 AM","11:00 AM","11:30 AM",
    "12:00 PM","4:00 PM","4:30 PM","5:00 PM",
    "5:30 PM","6:00 PM"
  ];

  // Set today as min date
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  document.getElementById('apptDate').min = today;
  document.getElementById('apptDate').value = today;

  function filterTimeSlots() {
    const selectedDate = document.getElementById('apptDate').value;
    const slotSelect = document.getElementById('timeSlot');
    const currentHour = now.getHours();
    const currentMin = now.getMinutes();

    slotSelect.innerHTML = '<option value="">Select</option>';

    allSlots.forEach(slot => {
      const [time, period] = slot.split(' ');
      let [h, m] = time.split(':').map(Number);
      if (period === 'PM' && h !== 12) h += 12;
      if (period === 'AM' && h === 12) h = 0;

      // If today, skip past slots + 30 min buffer
      if (selectedDate === today) {
        const slotMins = h * 60 + m;
        const nowMins = currentHour * 60 + currentMin + 30;
        if (slotMins <= nowMins) return;
      }

      const option = document.createElement('option');
      option.value = slot;
      option.textContent = slot;
      slotSelect.appendChild(option);
    });
  }

  // Run on page load
  filterTimeSlots();

  fetch('/api/doctors').then(r=>r.json()).then(docs => {
    const list = document.getElementById('doctorList');
    list.innerHTML = docs.map(d => `
      <div class="doctor-card" onclick="selectDoc(${d.id},'${d.name}','${d.specialty}',${d.fee},${d.available})" id="doc-${d.id}">
        <div class="doctor-avatar">👨‍⚕️</div>
        <div class="doctor-info">
          <div class="doctor-name">${d.name}</div>
          <div class="doctor-spec">${d.specialty}</div>
          <div class="doctor-meta">
            <span class="badge ${d.available?'badge-avail':'badge-busy'}">${d.available?'Available':'Unavailable'}</span>
            <span class="doctor-fee">₹${d.fee}</span>
            <span class="queue-info">Queue: ${d.queue_count}</span>
          </div>
        </div>
      </div>
    `).join('');
  });

  function selectDoc(id, name, spec, fee, avail) {
    if (!avail) { alert('This doctor is currently unavailable.'); return; }
    selectedDoctor = { id, name, spec, fee };
    document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('doc-' + id).classList.add('selected');
    document.getElementById('selectedDocInfo').classList.add('show');
    document.getElementById('selDocName').textContent = name + ' (' + spec + ')';
    document.getElementById('selDocFee').textContent = '₹' + fee;
  }

  function bookAppointment() {
    const name = document.getElementById('patientName').value.trim();
    const phone = document.getElementById('patientPhone').value.trim();
    const date = document.getElementById('apptDate').value;
    const slot = document.getElementById('timeSlot').value;
    if (!name || !phone || !date || !slot || !selectedDoctor) {
      alert('Please fill all fields and select a doctor.'); return;
    }
    fetch('/api/appointments', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ patient_name:name, patient_phone:phone, doctor_id:selectedDoctor.id, doctor_name:selectedDoctor.name, date, time_slot:slot })
    }).then(r=>r.json()).then(d => {
      if(!d.success) {
        alert('❌ ' + d.message);
        return;
      }
      document.getElementById('tokenNum').textContent = d.token;
      document.getElementById('apptSummary').textContent = `Dr. ${selectedDoctor.name} · ${date} · ${slot}`;
      document.getElementById('modal').classList.add('show');
    });
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    location.reload();
  }
</script>
</body>
</html>
